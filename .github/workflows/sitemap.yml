name: Submit Sitemaps

on:
  schedule:
    - cron: "0 13 * * 5"
      timezone: "America/Mexico_City"

  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create auth files
        run: |
          mkdir -p auth

          echo '${{ secrets.OAUTH_JSON }}' > auth/oauth.json

          echo '${{ secrets.TOKEN_JSON }}' > auth/token.json

      - name: Submit sitemaps
        run: npx tsx src/index.ts
