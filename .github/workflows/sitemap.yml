name: Submit Sitemaps

on:
  schedule:
    - cron: "0 20 * * 5"

  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create auth files
        run: |
          mkdir -p auth

          echo '${{ secrets.OAUTH_JSON }}' > auth/oauth.json

          echo '${{ secrets.TOKEN_JSON }}' > auth/token.json

      - name: Submit sitemaps
        run: npx tsx src/index.ts
